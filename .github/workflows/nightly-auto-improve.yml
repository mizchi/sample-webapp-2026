name: nightly-auto-improve

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-auto-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FLAKER_DIR: ${{ github.workspace }}/.tools/flaker
      VRT_DIR: ${{ github.workspace }}/.tools/vrt
    steps:
      - name: Checkout app
        uses: actions/checkout@v6

      - name: Checkout flaker
        uses: actions/checkout@v6
        with:
          repository: mizchi/flaker
          path: .tools/flaker

      - name: Checkout vrt
        uses: actions/checkout@v6
        with:
          repository: mizchi/vrt
          path: .tools/vrt

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        run: corepack enable

      - name: Install app dependencies
        run: pnpm install --frozen-lockfile

      - name: Install flaker dependencies
        run: pnpm --dir "$FLAKER_DIR" install --frozen-lockfile

      - name: Install vrt dependencies
        run: pnpm --dir "$VRT_DIR" install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install vrt Playwright browsers
        run: pnpm --dir "$VRT_DIR" exec playwright install --with-deps chromium

      - name: Prepare artifact directory
        run: mkdir -p .artifacts

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: true

      - name: Unit tests
        run: pnpm test
        continue-on-error: true

      - name: Playwright E2E
        run: pnpm test:e2e
        continue-on-error: true

      - name: flaker scheduled profile
        run: pnpm flaker:run:scheduled
        continue-on-error: true

      - name: flaker review markdown
        if: always()
        run: pnpm flaker:eval:markdown > .artifacts/flaker-review.md

      - name: VRT snapshot
        if: always()
        run: pnpm vrt:snapshot:ci
        continue-on-error: true

      - name: Build nightly context
        if: always()
        run: pnpm report:nightly-context

      - name: Run Codex
        if: always()
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/nightly-auto-improve.prompt.md
          working-directory: .
          sandbox: workspace-write

      - name: Create pull request
        if: always()
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/nightly-auto-improve
          commit-message: "chore: nightly quality improvements"
          title: "chore: nightly quality improvements"
          body: |
            Generated from the nightly flaker/vrt quality lane.

            Available artifacts:
            - `.artifacts/flaker-review.md`
            - `.artifacts/vrt-summary.md`
            - `.artifacts/nightly-context.md`
          labels: |
            automation
            quality
          delete-branch: true
          draft: true

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-quality-artifacts
          path: |
            .artifacts
            playwright-report
            vrt/dashboard
